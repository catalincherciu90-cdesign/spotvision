name = "spotvision"
main = "src/index.js"
compatibility_date = "2024-11-01"

# HTML-ul (schema-raft.html) e servit ca static asset din ./public.
# /  si  /index.html  ->  public/index.html
# /api/*              ->  Worker (src/index.js)
[assets]
directory = "./public"
binding = "ASSETS"
# Worker-ul ruleaza primul pe fiecare cerere (gate de autentificare),
# apoi serveste fisierele statice doar utilizatorilor logati.
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "spotvision"
database_id = "5dc0f665-cc52-4536-afdb-2223cd55b4e4"
