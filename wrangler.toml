# Configuratie Cloudflare Pages pentru SpotVision (schema rafturi).
# Frontend static (schema-raft.html) + Functions in /functions (inlocuiesc server.js).

name = "spotvision"
compatibility_date = "2024-11-06"
pages_build_output_dir = "."

# --- Baza de date partajata (Cloudflare D1) ---
# Baza de date D1 se poate lega in DOUA feluri (alege unul):
#
#  A) Din dashboard Cloudflare (recomandat, nu are nevoie de ID aici):
#     Pages -> proiectul tau -> Settings -> Functions -> D1 database bindings
#     Variable name: DB   ->   baza ta de date D1
#
#  B) Din wrangler CLI: decomenteaza blocul de mai jos si pune ID-ul real
#     (obtii ID-ul cu:  npx wrangler d1 create spotvision )
#
# [[d1_databases]]
# binding = "DB"
# database_name = "spotvision"
# database_id = "PUNE_AICI_ID-UL_BAZEI_D1"
