name = "organizator-depozit"
main = "src/index.js"
compatibility_date = "2024-11-01"

# HTML-ul aplicatiei e importat ca TEXT in Worker si servit direct (nu prin
# static assets), fiindca upload-ul de assets ramanea blocat pe versiunea veche.
# Astfel pagina se actualizeaza garantat la fiecare deploy (e in bundle-ul Worker-ului).
[[rules]]
type = "Text"
globs = ["**/*.html"]

[[d1_databases]]
binding = "DB"
database_name = "spotvision"
database_id = "5dc0f665-cc52-4536-afdb-2223cd55b4e4"
