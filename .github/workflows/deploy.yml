name: Deploy spotvision

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'wrangler.toml'
      - 'schema.sql'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Aplica migrare D1 (schema idempotenta)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: d1 execute spotvision --remote --file=./schema.sql

      - name: Deploy la Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy
